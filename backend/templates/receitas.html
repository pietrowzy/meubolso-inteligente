<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Receitas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <div class="menu">
        <h2>Nova Receita</h2>
        <a href="/dashboard">Voltar</a>
    </div>

    <form id="receitaForm" method="POST" action="/receitas">

        {% if erro %}
            <p style="color:red; text-align:center;">
                {{ erro }}
            </p>
        {% endif %}

        <input 
            type="text" 
            name="descricao" 
            id="descricaoReceita" 
            placeholder="Descrição da receita" 
            required
        >

        <input 
            type="number" 
            step="0.01" 
            name="valor" 
            id="valorReceita" 
            placeholder="Valor" 
            required
        >

        <input 
            type="date" 
            name="data_receita" 
            id="dataReceita" 
            required
        >

        <select name="categoria_id" id="categoriaReceita">
            <option value="">Selecione uma categoria</option>

            {% for categoria in categorias %}
                <option value="{{ categoria.id }}">
                    {{ categoria.nome }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Salvar Receita</button>

    </form>

</div>

</body>
</html>
